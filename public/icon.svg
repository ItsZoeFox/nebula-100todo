<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" shape-rendering="crispEdges">
  <rect width="192" height="192" fill="#03030f"/>
  <!-- Nebula glow -->
  <rect x="72" y="72" width="48" height="48" fill="#6d28d9" opacity="0.15"/>
  <rect x="64" y="64" width="64" height="64" fill="#7c3aed" opacity="0.08"/>
  <!-- Stars scattered -->
  <rect x="32" y="40" width="4" height="4" fill="#c8c8ff" opacity="0.4"/>
  <rect x="148" y="60" width="2" height="2" fill="#c8c8ff" opacity="0.3"/>
  <rect x="50" y="140" width="2" height="2" fill="#c8c8ff" opacity="0.3"/>
  <rect x="150" y="130" width="4" height="4" fill="#a78bfa" opacity="0.4"/>
  <rect x="28" y="100" width="2" height="2" fill="#c8c8ff" opacity="0.25"/>
  <rect x="160" y="90" width="2" height="2" fill="#c8c8ff" opacity="0.25"/>
  <!-- Center star (pixel art) -->
  <rect x="92" y="84" width="8" height="8" fill="#c084fc"/>
  <rect x="88" y="88" width="16" height="8" fill="#c084fc"/>
  <rect x="92" y="96" width="8" height="8" fill="#c084fc"/>
  <!-- Glow rings -->
  <rect x="88" y="84" width="4" height="4" fill="#c084fc" opacity="0.5"/>
  <rect x="100" y="84" width="4" height="4" fill="#c084fc" opacity="0.5"/>
  <rect x="88" y="100" width="4" height="4" fill="#c084fc" opacity="0.5"/>
  <rect x="100" y="100" width="4" height="4" fill="#c084fc" opacity="0.5"/>
  <!-- Outer glow -->
  <rect x="84" y="80" width="4" height="4" fill="#c084fc" opacity="0.2"/>
  <rect x="104" y="80" width="4" height="4" fill="#c084fc" opacity="0.2"/>
  <rect x="84" y="108" width="4" height="4" fill="#c084fc" opacity="0.2"/>
  <rect x="104" y="108" width="4" height="4" fill="#c084fc" opacity="0.2"/>
</svg>
